<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="dashboard.css">
  <title>Meet Attendance — Dashboard</title>
</head>
<body>
  <div class="dashboard">
    <!-- Session list (past sessions) -->
    <section id="sessions-list" class="section">
      <div class="dash-header">
        <div class="dash-header-left">
          <h1>Meet Attendance</h1>
          <p class="dash-subtitle">Your session reports</p>
        </div>
      </div>
      <div id="sessions-toolbar" class="sessions-toolbar hidden"></div>
      <div id="sessions-container" class="sessions-container">
        <p class="empty-state">No sessions recorded yet. Start tracking in a Google Meet call.</p>
      </div>
    </section>

    <!-- Session detail (populated dynamically) -->
    <section id="session-detail" class="section hidden"></section>
  </div>

  <script src="insights.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
